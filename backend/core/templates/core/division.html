{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division - Play2Learn</title>
    <link rel="icon" href="{% static 'images/logo.png' %}" type="image/x-icon">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/Operations.css' %}">
</head>
<body>
  <div class="container text-center position-relative">
     <!-- Botones de jugadores -->
  <div class="player-container d-flex flex-column align-items-start gap-2">
  <button class="player-button"onclick="alert('Kevin');">Player 1</button>
  <button class="player-button" onclick="alert('Sofia');">Player 2</button>
  <button class="player-button" onclick="alert(localStorage.getItem('jugador') || 'Your Name');">Your Name</button>
 </div>
 <div class="row">
   <div class="col-12">
    <h1>Division</h1>
  </div>
</div>
<!-- Operación y respuesta -->
<div class="row justify-content-center">
 <div class="col-auto">
  <div id="operation"></div>
    <input type="text" id="answer" readonly />
  </div>
</div>
 <!-- Teclado en pantalla -->
<div class="row justify-content-center mt-3">
 <div class="col-auto">
  <div id="board">
    <div class="grid-row">
      <div class="grid-col tecla">1</div>
      <div class="grid-col tecla">2</div>
      <div class="grid-col tecla">3</div>
      </div>
      <div class="grid-row">  
      <div class="grid-col tecla">4</div>
      <div class="grid-col tecla">5</div>
      <div class="grid-col tecla">6</div>
      </div>
    <div class="grid-row">
      <div class="grid-col tecla">7</div>
      <div class="grid-col tecla">8</div>
      <div class="grid-col tecla">9</div>
      </div>
    <div class="grid-row">
      <div class="grid-col tecla">.</div>
      <div class="grid-col tecla">0</div>
      <div class="grid-col tecla">Clear</div>
    </div>
      <div class="grid-row">
      <div class="grid-col tecla">Ok</div>
    </div>
  </div>
</div>
 <!-- Puntaje y tiempo -->
 <div class="row justify-content-center mt-4">
  <div class="col-auto">
    <div class="game-stats d-flex justify-content-between gap-5">
    <span class="stat-score me-5">Score: <strong id="score">0</strong></span>
    <span class="stat-time">Time Left: <strong id="time">60</strong></span>
    </div>
   </div>
  </div>

 <!-- SCRIPT PRINCIPAL -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
  let score = 0;
  let timeLeft = 30;

  const answerInput = document.getElementById('answer');
  const teclas      = document.querySelectorAll('.tecla');
  const opBox       = document.getElementById('operation');

    function newProblem () {
    const divisor  = Math.floor(Math.random() * 11) + 2;   // 2–12
    const dividend = Math.floor(Math.random() * 12) + 1;   // 1–12
    opBox.textContent        = `${dividend} ÷ ${divisor}`;
    answerInput.dataset.correct = (dividend / divisor).toFixed(2); // 2 decimales
    answerInput.value         = '';
    answerInput.focus();
  }

    function checkAnswer () {
    const user    = parseFloat(answerInput.value);
    const correct = parseFloat(answerInput.dataset.correct);
    if (!isNaN(user) && Math.abs(user - correct) < 0.01) { // tolerancia 2 dec.
      score++;
      document.getElementById('score').textContent = score;
    }
    newProblem();
  }

  teclas.forEach(t => {
    t.addEventListener('click', () => {
      const v = t.textContent;
      if (v === 'Clear') {
        answerInput.value = '';
      } else if (v === 'Ok') {
        checkAnswer();
        } else if (v === '.') {
        if (!answerInput.value.includes('.')) answerInput.value += '.';
      } else {
        answerInput.value += v;
      }
    });
  });

  // Entrada por teclado
      document.addEventListener('keydown', e => {
    const k = e.key;
    if ((k >= '0' && k <= '9') || k === '.') {
      e.preventDefault();                    // evita duplicados
      if (k === '.' && answerInput.value.includes('.')) return;
      answerInput.value += k;
    } else if (k === 'Backspace') {
      e.preventDefault();
      answerInput.value = answerInput.value.slice(0, -1);
    } else if (k === 'Enter') {
      checkAnswer();
    }
  });

  // Temporizador
  document.getElementById('time').textContent = timeLeft;
  const timer = setInterval(() => {
    timeLeft--;
    document.getElementById('time').textContent = timeLeft;
    if (timeLeft === 0) {
      clearInterval(timer);
      localStorage.setItem("finalScore", score);
      window.location.href = "/games/math/timesup/";
    }
  }, 1000);

  newProblem();
});
  </script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 </body>
</html>
