{% extends "core/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/contact-us.css' %}">
{% endblock %}

{% block content %}

<div class="container my-4">
<!-- ===== HEADER ===== -->
  <header class="text-center my-4">
    <h1>Contact Us</h1>
  </header>

  <!-- ===== FORMULARIO ===== -->
   <form method="POST" class="login-form">
    {% csrf_token %}

    <div class="mb-3">
      <label for="email" class="form-label">Email:</label>
      <input type="email" id="email" class="form-control" name="email" placeholder="Enter your email" required>
    </div>
    <div class="mb-3">
      <label for="subject" class="form-label">Subject:</label>
      <input type="text" id="subject" class="form-control" name="subject" placeholder="Enter the subject" required>
    </div>
    <div class="mb-3">
        <label for="message" class="form-label">Message:</label>
        <textarea id="message" class="form-control" name="message" placeholder="Enter your message" required></textarea>
      </div>
    <button type="submit" class="btn btn-primary my-custom-btn">Submit</button>
    {% if success %}
      <!-- Mensaje volador -->
<div class="fly-message show" id="flyMessage">Message sent</div>
    {% else %}
<div class="fly-message" id="flyMessage">Message sent</div>
    {% endif %}

  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const flyMessage = document.getElementById("flyMessage");

    if (flyMessage && flyMessage.classList.contains("show")) {
      setTimeout(() => {
        flyMessage.classList.remove("show");
      }, 2500);
    }
  });
</script>

{% endblock %}
