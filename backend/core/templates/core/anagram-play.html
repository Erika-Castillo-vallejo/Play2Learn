{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anagram Hunt | Play</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/anagram-hunt.css' %}">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

<div id="app">
  <main class="game-wrapper">
    <h1 class="game-title">Anagram Hunt</h1>

    <div class="game-stats text-white">
      <span class="stat-score">Score: <strong>[[ score ]]</strong></span>
      <span class="stat-time">Time Left: <strong>[[ timeLeft ]]</strong></span>
    </div>

    <h2 id="current-word" class="current-word">
      [[ baseWord ]]
      <span class="letters-left">
        ([[ possibleAnswers.length - guessedAnswers.length ]] left)
      </span>
    </h2>

    <section class="answer-box">
      <input
        type="text"
        id="guess-input"
        class="form-control text-center"
        placeholder="type here"
        autocomplete="off"
        v-model="guess"
        @keyup.enter="submitGuess"
      >

      <ol id="answers-list" class="mt-3">
        <li v-for="word in guessedAnswers" :key="word">
          [[ word ]]
        </li>
      </ol>
    </section>
  </main>
</div>

<script>
const { createApp } = Vue;

createApp({
  delimiters: ['[[', ']]'],

  data() {
    return {
      score: 0,
      timeLeft: 60,
      guess: "",
      baseWord: "",
      possibleAnswers: [],
      guessedAnswers: [],
      timer: null,

      wordArrays: [
        ["stop", "post", "pots", "opts", "tops", "spot"],
        ["beard", "bread", "bared", "debar"],
        ["rates", "stare", "aster", "tears"],
        ["notes", "stone", "tones", "onset"],
        ["crate", "trace", "cater", "react"],
        ["listen", "silent", "tinsel", "enlist", "inlets"],
        ["angel", "glean", "angle"],
        ["earth", "heart", "hater", "rathe"],
        ["alert", "alter", "later", "artel", "ratel"],
        ["bride", "bider", "rebid"],
        ["least", "slate", "stale", "steal", "tales", "teals"],
        ["meal", "male", "lame"],
        ["evil", "vile", "live", "veil"],
        ["dusty", "study"],
        ["finder", "friend"],
        ["relay", "layer", "early"],
        ["dare", "read", "dear"],
        ["tear", "rate", "tare"],
        ["spear", "pears", "reaps", "pares", "rapes"],
        ["stops", "posts", "spots", "tops", "opts"],
        ["strap", "traps"]
      ],

      selectedLength: parseInt(localStorage.getItem("wordLength")) || 5
    };
  },

  mounted() {
    this.startGame();
  },

  methods: {
    startGame() {
      this.score = 0;
      this.timeLeft = 60;
      this.pickNewWord();
      this.startTimer();
    },

    pickNewWord() {
      this.guessedAnswers = [];

      const filteredWords = this.wordArrays.filter(
        arr => arr[0].length === this.selectedLength
      );

      if (filteredWords.length === 0) {
        alert(`No words available for length ${this.selectedLength}.`);
        return;
      }

      const randomArray =
        filteredWords[Math.floor(Math.random() * filteredWords.length)];

      const randomIndex = Math.floor(Math.random() * randomArray.length);
      this.baseWord = randomArray[randomIndex];

      this.possibleAnswers = randomArray.filter(
        word => word !== this.baseWord
      );
    },

    startTimer() {
      clearInterval(this.timer);

      this.timer = setInterval(() => {
        this.timeLeft--;

        if (this.timeLeft <= 0) {
          clearInterval(this.timer);
          localStorage.setItem("finalScore", this.score);
          window.location.href = "/games/anagram/timesup/";
        }
      }, 1000);
    },

    submitGuess() {
      const guess = this.guess.toLowerCase().trim();
      this.guess = "";

      if (!guess) return;
      if (guess === this.baseWord) return;
      if (this.guessedAnswers.includes(guess)) return;

      if (this.possibleAnswers.includes(guess)) {
        this.guessedAnswers.push(guess);
        this.score++;

        if (this.guessedAnswers.length === this.possibleAnswers.length) {
          this.pickNewWord();
        }
      }
    }
  }
}).mount("#app");
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
