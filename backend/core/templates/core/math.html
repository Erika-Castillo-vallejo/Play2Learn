  <!-- JS -->
 <script>
    let jugador = "";
    let juegoElegido = "";

    function elegirJuego(opcion) {
      jugador = prompt("What's your name?");
      
      if (jugador) {
        const confirmacion = confirm(`You chose ${opcion}, ${jugador}. Do you want to continue?`);
        if (confirmacion) {
          juegoElegido = opcion;
          alert("Ready! The game will start now.");
        } else {
          alert("Selection cancelled.");
        }
      } else {
        alert("Please enter your name.");
      }
    }

    function startGame() {
    if (jugador && juegoElegido) {
  localStorage.setItem("jugador", jugador);
  localStorage.setItem("juegoElegido", juegoElegido);

  if (juegoElegido === "addition") {
    window.location.href = "/games/math/play/addition/";
  } else if (juegoElegido === "subtraction") {
    window.location.href = "/games/math/play/subtraction/";
  } else if (juegoElegido === "multiplication") {
    window.location.href = "/games/math/play/multiplication/";
  } else if (juegoElegido === "division") {
    window.location.href = "/games/math/play/division/";
  }
} else {
  alert("Please choose a game and enter your name first.");
}
    }
  </script>
  <!-- Bootstrap JS -->
