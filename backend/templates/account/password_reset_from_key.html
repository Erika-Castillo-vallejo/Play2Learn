{% extends "core/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<header class="text-center my-4 container">
  <h1>Set New Password</h1>
</header>

<div class="container d-flex justify-content-center">
  <form method="POST" class="login-form w-100" style="max-width: 500px;">
    {% csrf_token %}

    {% if form.errors %}
      <div class="alert alert-danger text-center">
        Please correct the errors below.
      </div>
    {% endif %}

    <div class="mb-3">
      <label for="id_password1" class="form-label">New Password:</label>
      {{ form.password1 }}
    </div>

    <div class="mb-3">
      <label for="id_password2" class="form-label">Confirm New Password:</label>
      {{ form.password2 }}
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Change Password
    </button>
  </form>
</div>
{% endblock %}
